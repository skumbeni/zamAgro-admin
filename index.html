<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"/>
<title>NEXLITE — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:       #0b1a0e;
    --surface:  #122016;
    --surface2: #1a2e1e;
    --border:   #2a4030;
    --green:    #2fbe6a;
    --amber:    #f5a623;
    --red:      #e05252;
    --muted:    #6b8f74;
    --text:     #e8f0ea;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

  .shell { display: flex; height: 100vh; }

  /* ── SIDEBAR ─────────────────────────────────── */
  .sidebar {
    width: 220px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 1.4rem 0; transition: transform .2s ease;
  }
  .sidebar-logo {
    font-family: var(--mono); color: var(--green); font-size: .85rem;
    letter-spacing: 2px; padding: 0 1.2rem 1.3rem; border-bottom: 1px solid var(--border);
  }
  .sidebar-logo span { display: block; font-size: .65rem; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  nav { flex: 1; padding: 1rem 0; overflow-y: auto; }
  .nav-section-label {
    padding: .6rem 1.2rem .3rem; font-size: .68rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .app-item {
    display: flex; align-items: center; gap: .7rem;
    padding: .7rem 1.2rem; cursor: pointer; font-size: .88rem;
    color: var(--muted); border-left: 3px solid transparent; transition: all .15s;
  }
  .app-item:hover { color: var(--text); background: var(--surface2); }
  .app-item.active { color: var(--green); border-left-color: var(--green); background: var(--surface2); }
  .app-item.disabled { opacity: .4; cursor: default; }
  .app-item.disabled:hover { background: none; color: var(--muted); }
  .app-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .app-item .name { flex: 1; }
  .app-item .soon {
    font-size: .62rem; font-family: var(--mono); color: var(--muted);
    background: var(--bg); padding: 1px 6px; border-radius: 20px; border: 1px solid var(--border);
  }
  .sidebar-footer {
    padding: 1rem 1.2rem 0; border-top: 1px solid var(--border);
    font-size: .72rem; color: var(--muted); font-family: var(--mono);
  }

  /* ── MAIN AREA ───────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    padding: .9rem 1.4rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 1rem;
    background: var(--surface); flex-shrink: 0;
  }
  .ham-btn {
    display: none; width: 34px; height: 34px; border-radius: 8px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text); font-size: 1rem; cursor: pointer;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .topbar-title { font-size: .95rem; font-weight: 600; flex: 1; }
  .topbar-title .dim { color: var(--muted); font-weight: 400; }

  .frame-wrap { flex: 1; position: relative; min-height: 0; }
  iframe { width: 100%; height: 100%; border: none; display: block; background: var(--bg); }

  /* ── HOME GRID ───────────────────────────────── */
  .home { padding: 2rem; overflow-y: auto; height: 100%; }
  .home h1 { font-size: 1.3rem; margin-bottom: .3rem; }
  .home p.sub { color: var(--muted); font-size: .88rem; margin-bottom: 1.8rem; }
  .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .app-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.3rem; cursor: pointer; transition: border-color .15s, transform .15s;
  }
  .app-card:hover { border-color: var(--green); transform: translateY(-2px); }
  .app-card.disabled { cursor: default; opacity: .45; }
  .app-card.disabled:hover { border-color: var(--border); transform: none; }
  .app-card .mark {
    width: 40px; height: 40px; border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-family: var(--mono); font-weight: 700; font-size: .95rem;
    color: #06120e; margin-bottom: .9rem;
  }
  .app-card h3 { font-size: .95rem; margin-bottom: .25rem; }
  .app-card p { font-size: .78rem; color: var(--muted); line-height: 1.4; }
  .app-card .tag {
    display: inline-block; margin-top: .8rem; font-size: .68rem; font-family: var(--mono);
    padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted);
  }

  .sidebar-backdrop { display: none; }

  @media (max-width: 720px) {
    .sidebar {
      position: fixed; z-index: 30; top: 0; left: 0; height: 100vh;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.4); }
    .ham-btn { display: flex; }
    .sidebar-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 20;
    }
    .sidebar-backdrop.open { display: block; }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">NEXLITE<span>Admin Console</span></div>
    <nav id="nav-list"></nav>
    <div class="sidebar-footer">Chongo Goodson Samuel</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="ham-btn" id="ham-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="topbar-title">NEXLITE <span class="dim">— Admin Console</span></div>
    </div>
    <div class="frame-wrap" id="frame-wrap">
      <!-- home or iframe injected here -->
    </div>
  </div>
</div>

<script>
/* ── APP REGISTRY ───────────────────────────────────────────────
   Add a new app by adding one entry here and dropping its admin
   panel HTML file next to this one. Nothing else needs to change. */
const APPS = [
  {
    id: 'chilimba',
    name: 'Chilimba Master',
    desc: 'Rotating savings group app — groups, tiers, and subscription requests.',
    color: '#2fae8b',
    initials: 'CM',
    src: 'chilimba-admin.html',
    available: true
  },
  {
    id: 'zamagro',
    name: 'ZamAgro Track',
    desc: 'Agro-shop management — businesses, tiers, and payment requests.',
    color: '#2fbe6a',
    initials: 'ZT',
    src: 'zamagro-admin.html',
    available: true
  },
  {
    id: 'mdm',
    name: 'MyDepotMaster',
    desc: 'Depot and inventory management.',
    color: '#4a9eff',
    initials: 'MD',
    src: 'mdm-admin.html',
    available: true
  },
  {
    id: 'motoconnect',
    name: 'MotoConnect Zambia',
    desc: 'Transport directory and rider management.',
    color: '#f5a623',
    initials: 'MC',
    src: 'motoconnect-admin.html',
    available: true
  },
  {
    id: 'schoolpro',
    name: 'School Pro',
    desc: 'Multi-tenant school administration (EduGenius).',
    color: '#a78bfa',
    initials: 'SP',
    src: 'schoolpro-admin.html',
    available: true
  },
  {
    id: 'satdepot',
    name: 'Satellite Depot Manager',
    desc: 'Depot manager licenses and subscription requests.',
    color: '#b8862f',
    initials: 'SD',
    src: 'satellite.html',
    available: true
  }
];

let activeApp = null;

function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = `<div class="nav-section-label">Apps</div>` + APPS.map(a => `
    <div class="app-item ${a.id === activeApp ? 'active' : ''} ${a.available ? '' : 'disabled'}"
         data-app="${a.id}" ${a.available ? `onclick="openApp('${a.id}')"` : ''}>
      <span class="app-dot" style="background:${a.color}"></span>
      <span class="name">${a.name}</span>
      ${a.available ? '' : '<span class="soon">Add file</span>'}
    </div>`).join('');
}

function renderHome() {
  activeApp = null;
  document.getElementById('topbar-title').innerHTML = 'NEXLITE <span class="dim">— Admin Console</span>';
  document.getElementById('frame-wrap').innerHTML = `
    <div class="home">
      <h1>Your apps</h1>
      <p class="sub">Pick an app to manage its groups, businesses, tiers, and requests.</p>
      <div class="app-grid">
        ${APPS.map(a => `
          <div class="app-card ${a.available ? '' : 'disabled'}" ${a.available ? `onclick="openApp('${a.id}')"` : ''}>
            <div class="mark" style="background:${a.color}">${a.initials}</div>
            <h3>${a.name}</h3>
            <p>${a.desc}</p>
            <span class="tag">${a.available ? 'Open panel' : 'File not added yet'}</span>
          </div>`).join('')}
      </div>
    </div>`;
  renderNav();
}

function openApp(id) {
  const app = APPS.find(a => a.id === id);
  if (!app || !app.available) return;
  activeApp = id;
  document.getElementById('topbar-title').innerHTML =
    `<span class="dim">NEXLITE /</span> ${app.name}`;
  document.getElementById('frame-wrap').innerHTML =
    `<iframe src="${app.src}" title="${app.name}"></iframe>`;
  renderNav();
  closeSidebar();
}

// Clicking the logo/home area returns to the app grid
document.querySelector('.sidebar-logo').style.cursor = 'pointer';
document.querySelector('.sidebar-logo').addEventListener('click', renderHome);

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  const open = sb.classList.toggle('open');
  bd.classList.toggle('open', open);
}
function closeSidebar() {
  if (window.innerWidth > 720) return;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}
document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebar);

renderHome();
</script>
</body>
</html>
